name: Mirror to farollapi-cloud

"on":
  push:
    branches:
      - '**'
  delete: {}
  create: {}
  workflow_dispatch: {}

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Mirror to farollapi-cloud
        run: |
          git config user.email "bot@mirror"
          git config user.name "Mirror Bot"
          git remote add mirror https://x-access-token:${{ secrets.FAROLLAPI_TOKEN }}@github.com/farollapi-cloud/${{ github.event.repository.name }}.git
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${{ secrets.FAROLLAPI_TOKEN }}" "https://api.github.com/repos/farollapi-cloud/${{ github.event.repository.name }}")
          if [ "$STATUS" = "404" ]; then
            curl -s -X POST -H "Authorization: token ${{ secrets.FAROLLAPI_TOKEN }}" -H "Content-Type: application/json" -d "{\"name\":\"${{ github.event.repository.name }}\",\"private\":${{ github.event.repository.private }}}" "https://api.github.com/user/repos"
            sleep 3
          fi
          git push mirror --mirror --force
